{% load l10n %}
<div
  id="{{ container_id }}"
  class="diploma-container"
  style="--diploma-base-width: {{ design_definition.canvas.width|unlocalize }}px; --diploma-base-height: {{ design_definition.canvas.height|unlocalize }}px; background-image:url('{% if fondo_url %}{{ fondo_url }}{% endif %}');">
  {% for item in render_elements %}
    {% if item.key != 'fondo_diploma' and item.visible %}
    <div
      class="diploma-item"
      style="left:{{ item.x|unlocalize }}px; top:{{ item.y|unlocalize }}px; width:{{ item.width|unlocalize }}px; height:{{ item.height|unlocalize }}px; font-size:{{ item.font_size|unlocalize }}px; color:{{ item.color }}; text-align:{{ item.align }}; z-index:{{ item.z_index|unlocalize }};">
      {% if item.type == 'imagen' %}
        {% if item.image_url %}
          <img src="{{ item.image_url }}" alt="{{ item.label }}">
        {% else %}
          <div class="image-fallback">{{ item.label }}</div>
        {% endif %}
      {% else %}
        <div class="text-block align-{{ item.align }}">{{ item.rendered_value }}</div>
      {% endif %}
    </div>
    {% endif %}
  {% endfor %}
</div>
