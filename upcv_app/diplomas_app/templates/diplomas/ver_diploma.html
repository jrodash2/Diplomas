<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diploma</title>
<style>
body { margin:0; padding:0; background:#f1f5f9; font-family:Arial, Helvetica, sans-serif; overflow:hidden; }
.toolbar { padding:10px; display:flex; gap:12px; background:#fff; border-bottom:1px solid #dbe2ea; justify-content:center; }
.btn { background:#0d6efd; color:#fff; padding:8px 14px; border:none; border-radius:6px; cursor:pointer; }
.btn:hover { background:#084bcc; }
.canvas-area { width:100vw; height:calc(100vh - 60px); display:flex; justify-content:center; align-items:center; overflow:auto; }
.canvas-content { transform-origin:center center; transition: transform .2s ease; }
.diploma-container { width:var(--diploma-base-width, 3508px); height:var(--diploma-base-height, 2480px); position:relative; background:#fff center center / cover no-repeat; box-shadow:0 10px 30px rgba(15,23,42,.16); border-radius:10px; overflow:hidden; }
.diploma-item { position:absolute; white-space:pre-wrap; box-sizing:border-box; }
.diploma-item img { width:100%; height:100%; object-fit:contain; }
.diploma-photo-circle { border-radius:50%; overflow:hidden; }
.diploma-photo-media { width:100%; height:100%; display:block; object-fit:cover; object-position:center; border-radius:50%; }
.diploma-photo-placeholder { border-radius:50%; overflow:hidden; }
.text-block { width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:4px 8px; white-space:pre-wrap; box-sizing:border-box; }
.text-block.align-left { justify-content:flex-start; }
.text-block.align-right { justify-content:flex-end; }
.image-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; border:1px dashed #64748b; background:rgba(255,255,255,.78); color:#475569; font-weight:600; box-sizing:border-box; }
</style>
</head>
<body>
<div class="toolbar">
    <button class="btn" id="zoomOut">–</button>
    <button class="btn" id="zoomIn">+</button>
    <button class="btn" id="fitScreen">Ajustar</button>
    <button class="btn" id="fullscreenBtn">Pantalla Completa</button>
    <button class="btn" id="btnDescargarJPG">Descargar JPG</button>
</div>

<div class="canvas-area" id="canvasArea">
  <div class="canvas-content" id="canvasContent">
    {% include 'diplomas/partials/diploma_canvas.html' with container_id='diplomaPreviewCanvas' %}
  </div>
</div>

<div id="diploma_export" style="position:fixed;left:-99999px;top:-99999px;width:{{ design_definition.canvas.width }}px;height:{{ design_definition.canvas.height }}px;overflow:hidden;">
  {% include 'diplomas/partials/diploma_canvas.html' with container_id='diplomaExportCanvas' %}
</div>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
let zoom = 0.28;
const canvasContent = document.getElementById('canvasContent');

function applyZoom() {
  canvasContent.style.transform = `scale(${zoom})`;
}

document.getElementById('zoomIn').onclick = () => { zoom += 0.05; applyZoom(); };
document.getElementById('zoomOut').onclick = () => { zoom = Math.max(0.1, zoom - 0.05); applyZoom(); };
document.getElementById('fitScreen').onclick = () => { zoom = Math.min(window.innerWidth / 3600, window.innerHeight / 2550); applyZoom(); };
document.getElementById('fullscreenBtn').onclick = () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
};

document.getElementById('btnDescargarJPG').onclick = async () => {
  const exportCanvasNode = document.getElementById('diplomaExportCanvas');

  const cloneImgs = exportCanvasNode.querySelectorAll('img');
  for (const img of cloneImgs) {
    try {
      const temp = new Image();
      temp.crossOrigin = 'anonymous';
      temp.src = img.src;
      await temp.decode();
      const c = document.createElement('canvas');
      c.width = temp.width;
      c.height = temp.height;
      c.getContext('2d').drawImage(temp, 0, 0);
      img.src = c.toDataURL('image/png');
    } catch (e) {}
  }

  const tempCanvas = await html2canvas(exportCanvasNode, { scale: 1, useCORS: true, backgroundColor: null });
  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = {{ design_definition.canvas.width }};
  finalCanvas.height = {{ design_definition.canvas.height }};
  finalCanvas.getContext('2d').drawImage(tempCanvas, 0, 0, {{ design_definition.canvas.width }}, {{ design_definition.canvas.height }});

  const link = document.createElement('a');
  link.href = finalCanvas.toDataURL('image/jpeg', 1.0);
  link.download = 'Diploma_{{ curso_empleado.empleado.nombres }}_{{ curso_empleado.empleado.apellidos }}.jpg';
  link.click();
};

applyZoom();
</script>
</body>
</html>
